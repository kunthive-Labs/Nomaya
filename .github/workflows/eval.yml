name: nomaya-eval

# Runs the compliance evaluation suite on every push/PR as a deployment gate.
# Uses deterministic mock mode — no API keys, no token spend — so CI is fast and
# reproducible. To gate against a real model, set a provider key as a repo secret
# and change --agent (e.g. openai/gpt-4o-mini) below.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - name: Ruff
        run: uv run ruff check nomaya tests
      - name: Mypy
        run: uv run mypy

  dashboard-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install
        working-directory: dashboard
        run: npm ci
      - name: Build
        working-directory: dashboard
        run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv venv --python 3.12
      - name: Install
        run: uv pip install -e ".[dev]"
      - name: Unit tests
        run: uv run pytest -q

  compliance-gate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"

      # The agent under test must clear the suite. Gate the build on the pass rate.
      - name: Compliance evaluation (gate at 100%)
        run: uv run nomaya run --agent mock/compliant-agent --fail-under 1.0

      # Sanity check: the harness must actually catch a known-bad agent.
      - name: Catch-the-bad-agent assertion
        run: |
          uv run nomaya run --agent mock/naive-agent --no-save > naive.txt || true
          uv run python - <<'PY'
          from nomaya.orchestrator import run_suite
          from nomaya.scenarios import load_scenarios
          m = run_suite(load_scenarios(), agent_model="mock/naive-agent").metrics
          assert m["violation_detection_rate"] == 1.0, m
          assert m["false_positive_rate"] == 0.0, m
          print("Harness caught the naive agent on every tempting scenario.")
          PY

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nomaya-report
          path: reports/
