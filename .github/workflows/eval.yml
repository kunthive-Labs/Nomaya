name: nomaya-eval

# Runs the compliance evaluation suite on every push/PR as a deployment gate.
# Uses deterministic mock mode — no API keys, no token spend — so CI is fast and
# reproducible (deps are pinned via uv.lock). To gate against a real model, set a
# provider key as a repo secret and change --agent (e.g. openai/gpt-4o-mini) below.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install (locked)
        run: uv sync --locked
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy nomaya

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install (locked)
        run: uv sync --locked
      - name: Unit tests
        run: uv run pytest -q

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  compliance-gate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Editable install: config.ROOT resolves to the checkout, so reports/ below
      # is the repo's reports dir. Keep in mind if switching to --no-editable.
      - run: uv sync --locked

      # The agent under test must clear the suite. Gate the build on the pass rate.
      - name: Compliance evaluation (gate at 100%)
        run: uv run nomaya run --agent mock/compliant-agent --fail-under 1.0

      # Sanity check: the harness must actually catch a known-bad agent.
      - name: Catch-the-bad-agent assertion
        run: |
          uv run nomaya run --agent mock/naive-agent --no-save > naive.txt || true
          uv run python - <<'PY'
          from nomaya.orchestrator import run_suite
          from nomaya.scenarios import load_scenarios
          m = run_suite(load_scenarios(), agent_model="mock/naive-agent").metrics
          assert m["violation_detection_rate"] == 1.0, m
          assert m["false_positive_rate"] == 0.0, m
          print("Harness caught the naive agent on every tempting scenario.")
          PY

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nomaya-report
          path: reports/
